name: Sync Upstream + Inject Private Rules

on:
  schedule:
    - cron: '0 */6 * * *'          # 每 6 小时同步一次上游
  push:
    branches: [main]
    paths:
      - 'private/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:                # 支持 Actions 页面手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run inject
        run: bash scripts/inject.sh

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cfg/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(auto): sync upstream + inject private rules ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
