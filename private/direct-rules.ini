;========================================================
; 私有 DIRECT 规则 —— 每次 Actions 运行会被自动注入到
; cfg/Custom_Clash*.ini 的 [custom] 段顶部，最高优先级
;
; 格式：ruleset=分组名,[]规则类型,参数[,no-resolve]
; 分组名必须与 Aethersailor 模板里定义的一致，最常用：
;   🎯 全球直连 = 直连
;   🚀 手动选择 = 走代理
;========================================================

; BladeAI 生产 VPS（alphalook.com 所有子域名 + 固定公网 IP）
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,alphalook.com
ruleset=🎯 全球直连,[]DOMAIN,alphalook.com
ruleset=🎯 全球直连,[]IP-CIDR,47.52.40.174/32,no-resolve

; 宝塔面板 IP 直连入口（冗余一次，防未来域名没解析）
ruleset=🎯 全球直连,[]IP-CIDR,47.52.40.174/32,no-resolve

; 以后想加其他直连，在本文件追加即可
; 例：
; ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,mycompany.internal
; ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve
